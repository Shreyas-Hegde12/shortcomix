<style>
  ::-webkit-scrollbar {display:none!important;}
  .desktop-menu, #open-mobile-menu, .mobile-header {display: none!important;}
  .width-limit{max-width: 1000px; min-height: 100%;  align-items: center; display: flex; flex-direction: column;}
  .bring-to-bottom:hover{ transform: translateY(10%); }
  
  /* SketchBook Viewer */
  .painting-container { width: 70vw; height: 100vw; max-width: 380px; max-height: 550px; background: var(--gray-bg); overflow: hidden; position: relative; transition: transform 1s ease, height 1s ease, border-radius 1s ease; justify-content: center; align-items: center; display: flex;}
  .painting-container img { width: 100%; }
  .iframe-container{width: 75%; height: min(35vw, 200px); border-radius: 30px;}
  
  iframe{width: 100%; height: 100%; position: absolute; z-index: 11;}
 
  
  /* Simplify Notes Button */
  .recommendation-btn {
  position: absolute;
  bottom: -10%;
  left: 50%;
  transform: translateX(-50%) translateY(-50%);
  z-index: 12;
  display: none;
  width: 45%;
  padding: 10px 20px;
  background: #111;
  color: white;
  font-family: acme;
  font-size: min(4.7vw, 18px);
  font-weight: bold;
  border: 2px solid rgba(255, 255, 255, 0.6);
  border-radius: 20px;
  box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
  opacity: 0;
  cursor: pointer;
  animation: glow-rotate 2s linear infinite;
  transition: opacity 0.4s ease, bottom 0.8s ease;
  pointer-events: auto;
}

  
  /* Sketch Tags List */
  .sketch-tags::-webkit-scrollbar { display: none; }
  .available-tag {width: auto; height: 100%; flex-shrink: 0; display: flex; justify-content: center; align-items: center; 
    font-size: min(5vw, 25px); font-family: acme; background: var(--gray-bg); border-radius: 30px; padding: 3% 7%; cursor: pointer; }
  .available-tag:hover{opacity: 0.8;}

  .sketch-tags-section::after { /* Soft shadow to right of sketch tags list to hint left to right scrolling */
  content: "";
  position: absolute;
  right: 0;
  top: 0;
  width: 50px;
  height: 100%;
  pointer-events: none;
  background: linear-gradient(to right, transparent, var(--primary-bg)); /* fade into page bg */
  }



@keyframes glow-rotate {
  0% {
    box-shadow: 0 0 10px rgba(255,255,255,0.3), 0 0 20px rgba(255,255,255,0.2);
    transform: translateX(-50%) rotate(0deg);
  }
  100% {
    box-shadow: 0 0 30px rgba(255,255,255,1), 0 0 40px rgba(255,255,255,1);
    transform: translateX(-50%) rotate(0deg);
  }
}

  align-items: center;

  left: 0px;
  touch-action: none;

<script>

let isFirstOpen = true,
    promptVisible = false;
  
const available_sketches = [
  {"name":"my college notebook", "url":"https://drive.google.com/file/d/1D3VHXohWO6o76GEGaoDsnZTe7df-5f2w/preview"},
  {"name":"just sketches", "url":"https://drive.google.com/file/d/1EoK5VA2XFmOHeSf1YP-JzSDxBxuEH-NM/preview"},
  {"name": "notebook (raw)", "url":"https://drive.google.com/file/d/1BV_tDea0iFlNGEwkBtwyO9zz25BJwMTF/preview"}
];
  

function monalisaEffect(){
 document.querySelector('.painting-container').classList.add('iframe-container');
  const time = isMobile ? 50: 500;
  setTimeout( ()=> {document.querySelector('.painting-container img').style.transform ="translateY(25%)";}, time);
}

function openPdf(idx){
  const pdfBox = document.querySelector('.painting-container iframe');
 
  pdfBox.src= available_sketches[idx]["url"]; 
  pdfBox.onload = () => {	
    //recommendationPrompt();
  };
  

}
  
function openSketch(idx){
 if (isFirstOpen) {
   monalisaEffect(); 
   sleep(1600).then( () => { 
     openPdf(idx); 
     const iframeContainer = document.querySelector('.painting-container');
   	 const calculatedHeightForIframe = ( iframeContainer.getBoundingClientRect().width * 6.6 )/5 + 'px'; 
   	 iframeContainer.style.height = calculatedHeightForIframe;
	 document.querySelector('iframe').style.background = "#222";
     document.querySelector('.rotate-handle svg').style.width="70%";
   });
   isFirstOpen = false;
 }
 else { 
   openPdf(idx);
 }
}
 
  
function recommendationPrompt() {
  if (!promptVisible) { document.querySelector('.recommendation-btn').style.display='block'; promptVisible = true;}
  
  const pdfBox = document.querySelector('.painting-container iframe');
  const btn = document.querySelector(".recommendation-btn");
  const notebookUrl = "https://drive.google.com/file/d/1BV_tDea0iFlNGEwkBtwyO9zz25BJwMTF/preview";
  
  if (pdfBox.src == notebookUrl) {
     const t1 = setTimeout(()=>{
    	btn.style.opacity = "1";
    	btn.style.bottom = "25%";
      
    	const t2 = setTimeout(() => {
     		btn.style.bottom = "15%";
    	}, 400); // snap-back effect
    }, 1000);
  }
  else {
    const t5 = setTimeout( () => {
    	btn.style.opacity = "0";
    	btn.style.bottom = "-10%";
    }, 500);
  }
  
}

  
function sketchTags(){
  const sketchSelect = document.querySelector(".available-tags");
  available_sketches.map(function(sketchObject, index){
    const html = `<div class="available-tag" onclick="openSketch(${index});">${sketchObject["name"]}</div>`;
    sketchSelect.insertAdjacentHTML("beforeend",html);
  });
}
sketchTags();
  
  
</script>
