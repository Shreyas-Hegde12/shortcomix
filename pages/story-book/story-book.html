<style>
  
:root {
  --lock-background: rgba(255,255,255,0.5);
  --lock-background-two: rgba(255,255,255,0.5);
}

@media (prefers-color-scheme: dark) {
  :root {
    --lock-background: rgba(74,73,132,0.2);
    --lock-background-two: rgba(0,0,0,0.4);
  }
} 
  
#open-mobile-menu, .mobile-header, .common-gap{display:none!important;}

#faq:target{display:block!important;}  
#a0zVs5q:target{display:none!important;}
  
.width-limit{max-width: 600px;}
  
.book-tape{
  width: 100%;
  height: auto;
  aspect-ratio: 2/1; 
  max-width: 600px; 
  position:relative; 
  margin:5% 0 0 0%; 
  overflow:hidden;
  transition: height 0.7s linear, transform 0.7s linear;
}
.book-tape > img {
  width: 100%; 
  height: auto; 
  aspect-ratio: 16/10; 
  transform:scale(1.1) rotate(4deg); 
  filter: hue-rotate(-6deg);
}
.portal-to-home{
  position:absolute; 
  top: 23%; 
  left: 7.5%; 
  width: 31%; 
  max-width: 200px; 
  height: auto; 
  aspect-ratio: 1/0.96;
  animation: portal_spin 7s ease infinite;
}
  
.book-wrap{
  margin-top: 13%;
  width:80%; 
  height: auto;
  max-width: 440px;
  box-sizing: border-box;
  aspect-ratio:4/5.95; 
  position:relative;
  user-select:none;
  pointer-events:none;
  filter: contrast(0.95);
  transition: all 0.4s ease;
  display: grid; 
  overflow: hidden;
  place-items: center;
}
.lock{
  display:flex; 
  flex-direction:column; 
  gap:5%; 
  opacity:0.001; 
  width: 100%; 
  height: 100%; 
  position:absolute;
  z-index: 100; 
  top: 0px; 
  left:0px; 
  cursor:pointer;
  justify-content:center; 
  place-items:center; 
  transition: 1s linear; 
  backdrop-filter: blur(3.5px);
  background: var(--lock-background);
}
.book-pdf{
  width: 100%; 
  height: auto; 
  aspect-ratio: 4/6.8; /*6.8;*/ 
  pointer-events: none;
  background: #efefef;
}
.lock-thumb{
  width: 90%; 
  height: auto; 
  max-width: 400px; 
  aspect-ratio: 16/11.5;  
  filter: hue-rotate(-18deg); 
  transform: rotate(8deg); 
  animation: 5s map_steer infinite;
}
.lock-thumb img{
  width: 100%;
  height: 100%; 
}
.the-map{
  width:100%; 
  height:100%; 
  z-index: 200; 
  position:absolute;
  top:0px;
  left:0px; 
  display:none;
  justify-content:center;
  place-items:center;
}
.the-map img{
  width: 85%; 
  height: auto; 
  aspect-ratio:4/7;
  max-width: 320px; 
  opacity:0; 
  transform:scale(0.2); 
  filter: saturate(0.8);
  transition: transform 2s ease;
}
.opening-map{
  animation: opening_map 2s 1; 
  animation-fill-mode:forwards;
  transition: 2s ease-in-out 1;
}

.foot-links{
  display: flex; 
  flex-direction:row; 
  gap: 60px; 
  place-items:center;
  justify-content:center;
  margin-bottom: 5%;
}
.foot-links p{
  cursor: pointer;
  font-family: sedan; 
  font-size: min(4vw,22px); 
  opacity: 0.8;
  color: var(--text-clr-dull); 
}
  

/* Media Queries */
@media(max-width:650px){
  .foot-links{margin-top:8%;}
}
@media(min-width:650px){
  .book-wrap{margin:0px!important;}
  .para1{margin: 10% 0 0 0!important;}  
  .foot-links{margin-top:10%;}
}
 
/* Keyframes */
@keyframes portal_spin{
to{transform: rotate(-360deg);}
}
@keyframes map_steer{
50%{transform:rotateZ(-4deg);}
}
@keyframes opening_map{
to{transform:scale(1); opacity:1;}
}  

</style>


<script>
  
function preloadMapImage() {
	const mapImg = document.createElement('link');
  	mapImg.href = '/images/static/map-to-open-the-book.jpg';
  	mapImg.rel = 'preload';
  	mapImg.as = 'image';
  	document.head.appendChild(mapImg);
}
  
function lock(){
  preloadMapImage();

  if(window.location.hash === '#a0zVs5q'){
    document.querySelector('.book-pdf').style.pointerEvents='auto';
  	document.querySelectorAll('p').forEach(p=>{p.style.display='none'});
    return
  }
  
  setTimeout(()=>{
      document.querySelector('.lock').style.opacity="1";
      document.querySelector('.lock').style.pointerEvents="auto";
      document.querySelector('.book-wrap').style.pointerEvents="auto";
  },700);
}
  
function map(){
  const lockImg = document.querySelector('.lock-thumb img');
  lockImg.style.transition = 'transform 1s ease';
  lockImg.style.transform = 'scale(0) rotate(80deg)';
  
  document.querySelector('.the-map').style.display = 'flex';
  document.querySelector('.the-map img').classList.add('opening-map');
  
  setTimeout( ()=> { // book tape element being collapsed
  const bookTapeClose = document.querySelector('.book-tape');
  bookTapeClose.style.height = bookTapeClose.offsetHeight + "px"; 
  bookTapeClose.offsetHeight;
  bookTapeClose.style.height = '0px';
  }, 10);
  
  const color = getComputedStyle(document.documentElement).getPropertyValue('--lock-background-two');
  document.querySelector('.lock').style.background = color; 
}
 
</script>
