
<html>

<link href="/assets/css/style.css" rel="stylesheet" />
<style>
@import url("https://fonts.googleapis.com/css2?family=Acme&family=Gloria+Hallelujah&family=Indie+Flower&family=Open+Sans&family=Sedan&family=Montserrat&display=swap");
      
      *{margin:0px; padding:0px;}
      :root{ --pinkish-shade: #ffabc0; }
      .desktop-menu, #open-mobile-menu, .mobile-header, #main-wrapper { display:none!important; } 
      
      @media(prefers-color-scheme:dark){ 
        body{background-color: #222;}
        p, button{color:white!important;} 
        button{background:#6b6b6b!important;}
        :root{ --pinkish-shade: #ffabc0; }
      }
      @media(max-width:650px){ 
      .container { gap: 8%; }
      }
      @media(min-width:650px){ 
      .container { gap: 5%; }
      }
      #dvd-playground{animation: fall_down ease-in-out 5s; animation-delay: 2s; animation-fill-mode: forwards;}
      .soft-touch-btn {animation: soft_touch 1.1s 1;}
      
      @keyframes soft_touch {
      13% { transform: scale(0.92); }
      40% { transform: scale(1.03); }
      70% { transform: scale(1); }
      }
      #dvd-playground p {
  position: absolute;
  aspect-ratio: 2 / 0.85; 
  overflow: hidden;/* Example: adjust as needed */
  display: flex;
  align-items: center;
  justify-content: center;
  animation: bounceRhombus 2.8s linear infinite;
}

@keyframes bounceRhombus {
  0%   {
    top: 0;
    left: 50%;
    transform: translate(-50%, 0);
  }
  25%  {
    top: 50%;
    left: 100%;
    transform: translate(-100%, -50%);
  }
  50%  {
    top: 100%;
    left: 50%;
    transform: translate(-50%, -100%);
  }
  75%  {
    top: 50%;
    left: 0;
    transform: translate(0, -50%);
  }
  100% {
    top: 0;
    left: 50%;
    transform: translate(-50%, 0);
  }
}
      @keyframes fall_down{ 
      50%{ transform: scale(1.12) translateY(80%) translateX(-95%) rotate(-20deg);  opacity: 1;}
      60%{ transform: scale(1.12) translateY(80%) translateX(-95%) rotate(-20deg); opacity: 0;}
      70%{ transform: scale(1.12) translateY(80%) translateX(-95%) rotate(-20deg); opacity: 0;}
      100%{ transform: scale(0) translateY(80%) translateX(-95%) rotate(-20deg); opacity: 0;}
      }
      </style>
</head>
