[[headers]]
  for = "/search.json"
  [headers.values]
    Access-Control-Allow-Origin = "https://shortcomix.blogspot.com"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "application/javascript"
